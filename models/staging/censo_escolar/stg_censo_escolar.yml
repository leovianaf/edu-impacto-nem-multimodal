version: 2

models:
  - name: stg_censo_escolar_escolas_2019_2024
    description: >
      Microdados do Censo Escolar 2019-2024 em granularidade escola/ano,
      com colunas selecionadas para identificação, contexto de educação básica,
      infraestrutura escolar e proxies de implementação do Novo Ensino Médio.
      A staging preserva nulos estruturais e não realiza imputação.
    columns:
      - name: ano
        description: Ano do Censo Escolar, padronizado a partir de NU_ANO_CENSO.
        tests:
          - not_null
          - accepted_values:
              values: [2019, 2020, 2021, 2022, 2023, 2024]
      - name: id_municipio
        description: Código IBGE de 7 dígitos do município, padronizado a partir de CO_MUNICIPIO e preservado como texto.
        tests:
          - not_null
          - relationships:
              to: ref('br_bd_diretorios_brasil_municipio')
              field: id_municipio
      - name: id_escola
        description: Código da escola no Censo Escolar, padronizado a partir de CO_ENTIDADE.
        tests:
          - not_null
      - name: co_uf
        description: Código da unidade federativa, preservado como texto.
        tests:
          - not_null
      - name: sg_uf
        description: Sigla da unidade federativa.
        tests:
          - not_null
          - accepted_values:
              values: [AC, AL, AP, AM, BA, CE, DF, ES, GO, MA, MT, MS, MG, PA, PB, PR, PE, PI, RJ, RN, RS, RO, RR, SC, SP, SE, TO]
      - name: no_uf
        description: Nome da unidade federativa informado no Censo Escolar.
      - name: no_municipio
        description: Nome do município informado no Censo Escolar.
      - name: no_entidade
        description: Nome da escola informado no Censo Escolar.
      - name: tp_dependencia
        description: Tipo de dependência administrativa da escola.
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4]
      - name: tp_localizacao
        description: Localização da escola, urbana ou rural conforme codificação do Censo Escolar.
        tests:
          - not_null
          - accepted_values:
              values: [1, 2]
      - name: in_bas
        description: Indicador derivado de oferta de pelo menos uma etapa/modalidade da educação básica na escola.
        tests:
          - accepted_values:
              values: [0, 1]
      - name: in_inf
        description: Indicador de oferta de educação infantil na escola.
        tests:
          - accepted_values:
              values: [0, 1]
      - name: in_fund
        description: Indicador de oferta de ensino fundamental na escola.
        tests:
          - accepted_values:
              values: [0, 1]
      - name: in_med
        description: Indicador de oferta de ensino médio na escola.
        tests:
          - accepted_values:
              values: [0, 1]
      - name: in_prof
        description: Indicador de oferta de educação profissional na escola.
        tests:
          - accepted_values:
              values: [0, 1]
      - name: in_prof_tec
        description: Indicador de oferta de educação profissional técnica na escola.
        tests:
          - accepted_values:
              values: [0, 1]
      - name: in_eja
        description: Indicador de oferta de Educação de Jovens e Adultos na escola.
        tests:
          - accepted_values:
              values: [0, 1]
      - name: in_regular
        description: Indicador de oferta de ensino regular.
        tests:
          - accepted_values:
              values: [0, 1]
      - name: in_mediacao_presencial
        description: Indicador de mediação didático-pedagógica presencial.
      - name: in_mediacao_semipresencial
        description: Indicador de mediação didático-pedagógica semipresencial.
      - name: in_mediacao_ead
        description: Indicador de mediação didático-pedagógica a distância.
      - name: in_biblioteca
        description: Indicador de existência de biblioteca na escola.
        tests:
          - accepted_values:
              values: [0, 1]
      - name: in_biblioteca_sala_leitura
        description: Indicador de biblioteca ou sala de leitura na escola.
      - name: in_internet
        description: Indicador de acesso à internet na escola.
        tests:
          - accepted_values:
              values: [0, 1]
      - name: in_internet_aprendizagem
        description: Indicador de internet voltada ao uso pedagógico/aprendizagem.
        tests:
          - accepted_values:
              values: [0, 1]
      - name: in_laboratorio_ciencias
        description: Indicador de laboratório de ciências na escola.
        tests:
          - accepted_values:
              values: [0, 1]
      - name: in_laboratorio_informatica
        description: Indicador de laboratório de informática na escola.
        tests:
          - accepted_values:
              values: [0, 1]
      - name: in_quadra_esportes
        description: Indicador de quadra de esportes na escola.
      - name: qt_salas_utilizadas
        description: Quantidade de salas utilizadas pela escola.
      - name: qt_mat_bas
        description: Quantidade total de matrículas da educação básica na escola.
      - name: qt_mat_inf
        description: Quantidade de matrículas em educação infantil na escola.
      - name: qt_mat_fund
        description: Quantidade de matrículas em ensino fundamental na escola.
      - name: qt_mat_med
        description: Quantidade de matrículas no ensino médio.
      - name: qt_mat_med_prop
        description: Quantidade de matrículas no ensino médio propedêutico/tradicional. Disponível quando o layout do ano informa esse recorte.
      - name: qt_mat_med_ct
        description: Quantidade de matrículas no ensino médio articulado a curso técnico. Disponível quando o layout do ano informa esse recorte.
      - name: qt_mat_med_nm
        description: Quantidade de matrículas no ensino médio normal/magistério. Disponível quando o layout do ano informa esse recorte.
      - name: qt_mat_med_int
        description: Quantidade de matrículas em tempo integral no ensino médio.
      - name: qt_mat_prof
        description: Quantidade de matrículas na educação profissional.
      - name: qt_mat_prof_tec
        description: Quantidade de matrículas na educação profissional técnica.
      - name: qt_doc_bas
        description: Quantidade de docentes na educação básica da escola.
      - name: qt_doc_fund
        description: Quantidade de docentes no ensino fundamental.
      - name: qt_doc_med
        description: Quantidade de docentes no ensino médio.
      - name: qt_doc_prof_tec
        description: Quantidade de docentes na educação profissional técnica.
      - name: qt_tur_bas
        description: Quantidade de turmas da educação básica na escola.
      - name: qt_tur_fund
        description: Quantidade de turmas de ensino fundamental.
      - name: qt_tur_med
        description: Quantidade de turmas de ensino médio.
      - name: qt_tur_prof_tec
        description: Quantidade de turmas de educação profissional técnica.
      - name: qt_tur_med_int
        description: Quantidade de turmas em tempo integral no ensino médio. Disponível quando o layout do ano informa esse recorte.

